<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Voorraad">
<meta name="app-versie" content="1.0">
<title>Voorraad</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F5F6FA;
  --card: #FFFFFF;
  --card2: #F0F1F6;
  --card3: #E8EAF2;
  --text: #1A1D2E;
  --muted: #8890B0;
  --border: #E2E5F0;
  --c-koelkast: #2979FF;
  --c-vriezer: #00BFA5;
  --c-droog: #FF8F00;
  --c-danger: #F44336;
  --c-warn: #FF9800;
  --c-ok: #43A047;
  --c-purple: #7B61FF;
  --shadow: 0 1px 4px rgba(0,0,0,0.07);
  --radius: 14px;
  --radius-sm: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; width: 100%; background: var(--bg); font-family: 'Nunito', sans-serif; color: var(--text); overflow: hidden; }
.app { display: flex; flex-direction: column; height: 100vh; padding-top: max(env(safe-area-inset-top), 16px); }

/* Header */
.header { padding: 0 16px 10px; flex-shrink: 0; }
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.header h1 { font-size: 22px; font-weight: 900; color: var(--text); }
.header-btns { display: flex; gap: 6px; }
.hbtn { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 7px 13px; font-family: 'Nunito', sans-serif; font-size: 12px; font-weight: 800; color: var(--text); cursor: pointer; box-shadow: var(--shadow); }
.hbtn:active { transform: scale(0.96); background: var(--card2); }

/* Herinnering banner */
.herinnering-banner { margin: 0 16px 10px; background: #FFF8E1; border: 1px solid #FFD54F; border-radius: var(--radius); padding: 10px 14px; display: none; cursor: pointer; }
.herinnering-banner.zichtbaar { display: block; }
.herinnering-titel { font-size: 12px; font-weight: 900; color: #E65100; margin-bottom: 6px; display: flex; align-items: center; justify-content: space-between; }
.herinnering-item { font-size: 12px; color: #5D4037; font-weight: 600; padding: 2px 0; display: flex; align-items: center; gap: 6px; }

/* Zoekbalk */
.zoek-wrap { position: relative; margin: 0 16px 10px; }
.zoek-input { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 9px 14px 9px 34px; font-family: 'Nunito', sans-serif; font-size: 14px; color: var(--text); outline: none; box-shadow: var(--shadow); }
.zoek-input::placeholder { color: var(--muted); }
.zoek-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); font-size: 14px; color: var(--muted); }

/* Tabs */
.tabs { display: flex; gap: 5px; padding: 0 16px 10px; flex-shrink: 0; overflow-x: auto; }
.tabs::-webkit-scrollbar { display: none; }
.tab { flex: 1; min-width: 60px; padding: 8px 4px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--card); font-family: 'Nunito', sans-serif; font-size: 11px; font-weight: 800; color: var(--muted); cursor: pointer; text-align: center; box-shadow: var(--shadow); transition: all 0.15s; white-space: nowrap; }
.tab:active { transform: scale(0.96); }
.tab-icon { font-size: 16px; display: block; margin-bottom: 2px; }
.tab.t-koelkast.active { background: #E3F2FD; border-color: var(--c-koelkast); color: var(--c-koelkast); }
.tab.t-vriezer.active { background: #E0F2F1; border-color: var(--c-vriezer); color: var(--c-vriezer); }
.tab.t-droog.active { background: #FFF8E1; border-color: var(--c-droog); color: var(--c-droog); }
.tab.t-alarm.active { background: #FFF3E0; border-color: var(--c-danger); color: var(--c-danger); }
.tab.t-boodschappen.active { background: #F3E5F5; border-color: #9C27B0; color: #9C27B0; }
.tab.t-claude.active { background: #EDE7F6; border-color: var(--c-purple); color: var(--c-purple); }
.badge-tab { display: inline-block; background: var(--c-danger); color: #fff; border-radius: 99px; font-size: 9px; padding: 1px 5px; margin-left: 3px; font-weight: 900; }

/* Content */
.content { flex: 1; overflow-y: auto; padding: 0 16px 100px; -webkit-overflow-scrolling: touch; }
.panel { display: none; }
.panel.active { display: block; }

/* Categorie header */
.cat-header { display: flex; align-items: center; gap: 8px; margin: 14px 0 7px; }
.cat-label { font-size: 10px; font-weight: 900; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; white-space: nowrap; }
.cat-lijn { flex: 1; height: 1px; background: var(--border); }

/* Product card */
.prod-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 11px 13px; margin-bottom: 7px; display: flex; align-items: center; gap: 11px; cursor: pointer; box-shadow: var(--shadow); transition: all 0.15s; }
.prod-card:active { transform: scale(0.98); background: var(--card2); }
.prod-card.status-op { opacity: 0.55; }
.prod-card.heeft-alarm { border-left: 3px solid var(--c-danger); }
.prod-card.heeft-warn { border-left: 3px solid var(--c-warn); }
.prod-icon { font-size: 26px; flex-shrink: 0; }
.prod-info { flex: 1; min-width: 0; }
.prod-naam { font-size: 14px; font-weight: 700; color: var(--text); }
.prod-detail { font-size: 11px; color: var(--muted); margin-top: 1px; font-weight: 600; }
.prod-houdbaar { font-size: 11px; margin-top: 3px; font-weight: 700; }
.prod-houdbaar.ok { color: var(--c-ok); }
.prod-houdbaar.warn { color: var(--c-warn); }
.prod-houdbaar.danger { color: var(--c-danger); }
.prod-right { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; flex-shrink: 0; }
.status-pill { font-size: 10px; font-weight: 800; padding: 3px 9px; border-radius: 99px; }
.s-vol { background: #E8F5E9; color: #388E3C; }
.s-half { background: #FFF8E1; color: #F57F17; }
.s-bijna { background: #FFF3E0; color: #E65100; }
.s-op { background: #FFEBEE; color: #C62828; }

/* Stats */
.stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; margin-bottom: 14px; }
.stat { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 8px; text-align: center; box-shadow: var(--shadow); }
.stat-num { font-size: 20px; font-weight: 900; }
.stat-label { font-size: 9px; color: var(--muted); font-weight: 700; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px; }

/* Alarm panel */
.alarm-sectie { margin-bottom: 16px; }
.alarm-card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; box-shadow: var(--shadow); margin-bottom: 8px; }
.alarm-card-header { padding: 10px 14px; font-size: 12px; font-weight: 900; display: flex; align-items: center; gap: 6px; }
.alarm-card-header.danger { background: #FFEBEE; color: #C62828; }
.alarm-card-header.warn { background: #FFF8E1; color: #E65100; }
.alarm-card-header.bijna { background: #FFF3E0; color: #BF360C; }
.alarm-item { padding: 9px 14px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 10px; cursor: pointer; }
.alarm-item:active { background: var(--card2); }
.alarm-item-icon { font-size: 22px; flex-shrink: 0; }
.alarm-item-info { flex: 1; }
.alarm-item-naam { font-size: 13px; font-weight: 700; color: var(--text); }
.alarm-item-detail { font-size: 11px; color: var(--muted); font-weight: 600; margin-top: 1px; }
.alarm-item-badge { font-size: 10px; font-weight: 800; padding: 3px 8px; border-radius: 99px; flex-shrink: 0; }
.badge-danger { background: #FFEBEE; color: #C62828; }
.badge-warn { background: #FFF8E1; color: #E65100; }
.badge-bijna { background: #FFF3E0; color: #BF360C; }
.alarm-leeg { text-align: center; padding: 40px 20px; }
.alarm-leeg-icon { font-size: 48px; margin-bottom: 10px; }
.alarm-leeg p { font-size: 14px; color: var(--muted); font-weight: 600; }

/* Boodschappenlijst */
.boodschap-item { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 11px 13px; margin-bottom: 7px; display: flex; align-items: center; gap: 11px; box-shadow: var(--shadow); }
.boodschap-item.gekocht { opacity: 0.4; }
.boodschap-check { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; font-size: 12px; transition: all 0.15s; }
.boodschap-check.aan { background: var(--c-ok); border-color: var(--c-ok); color: #fff; }
.boodschap-naam { flex: 1; font-size: 13px; font-weight: 700; color: var(--text); }
.boodschap-sub { font-size: 11px; color: var(--muted); font-weight: 600; }
.boodschap-loc { font-size: 10px; font-weight: 800; padding: 2px 8px; border-radius: 99px; flex-shrink: 0; }
.bl-koelkast { background: #E3F2FD; color: var(--c-koelkast); }
.bl-vriezer { background: #E0F2F1; color: var(--c-vriezer); }
.bl-droog { background: #FFF8E1; color: var(--c-droog); }

/* Update banner */
.update-banner { margin: 0 16px 8px; background: #E8F5E9; border: 1px solid #81C784; border-radius: var(--radius); padding: 10px 14px; display: none; align-items: center; gap: 10px; }
.update-banner.zichtbaar { display: flex; }
.update-tekst { flex: 1; font-size: 13px; font-weight: 700; color: #2E7D32; }
.update-btn { background: #43A047; border: none; border-radius: 99px; padding: 6px 14px; font-family: Nunito,sans-serif; font-size: 12px; font-weight: 800; color: #fff; cursor: pointer; flex-shrink: 0; }
.update-btn:active { transform: scale(0.96); }

/* Sync indicator */
.sync-bar { display: flex; align-items: center; gap: 6px; padding: 4px 16px 0; flex-shrink: 0; }
.sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--c-ok); flex-shrink: 0; }
.sync-dot.bezig { background: var(--c-warn); animation: pulse 1s infinite; }
.sync-dot.fout { background: var(--c-danger); }
.sync-tekst { font-size: 11px; color: var(--muted); font-weight: 700; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
.leeg { text-align: center; padding: 40px 20px; }
.leeg-icon { font-size: 44px; margin-bottom: 10px; }
.leeg p { font-size: 14px; color: var(--muted); font-weight: 600; }

/* FAB */
.fab { position: fixed; bottom: max(env(safe-area-inset-bottom), 16px); right: 20px; width: 52px; height: 52px; border-radius: 50%; background: var(--text); border: none; font-size: 26px; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 16px rgba(0,0,0,0.18); z-index: 50; }
.fab:active { transform: scale(0.93); }

/* Sheet overlay */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 100; align-items: flex-end; justify-content: center; }
.overlay.open { display: flex; }
.sheet { background: var(--card); border-radius: 22px 22px 0 0; padding: 18px 18px max(env(safe-area-inset-bottom), 18px); width: 100%; max-height: 92vh; overflow-y: auto; }
.sheet-handel { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 14px; }
.sheet h2 { font-size: 17px; font-weight: 900; margin-bottom: 14px; color: var(--text); }
.form-label { font-size: 11px; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; display: block; }
.form-input { width: 100%; background: var(--card2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 13px; font-family: 'Nunito', sans-serif; font-size: 14px; color: var(--text); outline: none; margin-bottom: 12px; }
.form-input:focus { border-color: var(--c-koelkast); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.seg { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 12px; }
.seg-btn { flex: 1; min-width: 56px; padding: 8px 4px; background: var(--card2); border: 1px solid var(--border); border-radius: var(--radius-sm); font-family: 'Nunito', sans-serif; font-size: 11px; font-weight: 800; color: var(--muted); cursor: pointer; text-align: center; }
.seg-btn.active { background: var(--text); color: #fff; border-color: var(--text); }
.btn-primary { width: 100%; padding: 13px; background: var(--text); border: none; border-radius: var(--radius); font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 900; color: #fff; cursor: pointer; margin-top: 4px; }
.btn-primary:active { transform: scale(0.97); opacity: 0.9; }
.btn-sec { width: 100%; padding: 11px; background: transparent; border: 1px solid var(--border); border-radius: var(--radius); font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 700; color: var(--muted); cursor: pointer; margin-top: 7px; }
.btn-danger-outline { width: 100%; padding: 11px; background: transparent; border: 1px solid var(--c-danger); border-radius: var(--radius); font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 700; color: var(--c-danger); cursor: pointer; margin-top: 7px; }
.snel-list { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-bottom: 12px; max-height: 180px; overflow-y: auto; }
.snel-item { background: var(--card2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 7px 4px; text-align: center; cursor: pointer; font-size: 11px; font-weight: 700; color: var(--muted); }
.snel-item:active { background: var(--card3); color: var(--text); }

/* Recept */
.recept-item { background: var(--card2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 11px 13px; cursor: pointer; margin-bottom: 7px; font-family: 'Nunito', sans-serif; color: var(--text); appearance: none; -webkit-appearance: none; }
.recept-item:active { background: var(--card3); }
.recept-naam { font-size: 13px; font-weight: 800; color: var(--text); }
.recept-ing { font-size: 11px; color: var(--muted); margin-top: 3px; font-weight: 600; }
.recept-ok { font-size: 11px; color: var(--c-ok); margin-top: 4px; font-weight: 700; }
.recept-warn { font-size: 11px; color: var(--c-warn); margin-top: 4px; font-weight: 700; }

/* Claude chat */
.chat-wrap { display: flex; flex-direction: column; height: 100%; }
.geheugen-blok { background: #EDE7F6; border: 1px solid #D1C4E9; border-radius: var(--radius); padding: 11px 13px; margin-bottom: 12px; }
.geheugen-titel { font-size: 11px; font-weight: 900; color: var(--c-purple); text-transform: uppercase; letter-spacing: 0.5px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.geheugen-item { display: flex; align-items: center; gap: 8px; padding: 5px 0; border-bottom: 1px solid #D1C4E9; }
.geheugen-item:last-child { border-bottom: none; }
.geheugen-tekst { flex: 1; font-size: 12px; font-weight: 600; color: var(--text); }
.geheugen-del { background: none; border: none; color: var(--muted); font-size: 14px; cursor: pointer; padding: 0; }
.geheugen-leeg { font-size: 12px; color: var(--muted); font-style: italic; }
.pin-btn { background: var(--c-purple); border: none; border-radius: 99px; padding: 4px 10px; font-family: Nunito,sans-serif; font-size: 11px; font-weight: 800; color: #fff; cursor: pointer; }
.snelvraag-wrap { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
.snelvraag { background: var(--card); border: 1px solid var(--border); border-radius: 99px; padding: 5px 11px; font-size: 11px; font-weight: 700; color: var(--text); cursor: pointer; box-shadow: var(--shadow); }
.snelvraag:active { background: var(--card2); }
.chat-msgs { flex: 1; overflow-y: auto; padding-bottom: 6px; }
.msg { margin-bottom: 10px; display: flex; flex-direction: column; }
.msg.user { align-items: flex-end; }
.msg.claude { align-items: flex-start; }
.msg-label { font-size: 10px; color: var(--muted); font-weight: 800; margin-bottom: 3px; padding: 0 3px; }
.msg-bubble { max-width: 86%; padding: 9px 13px; border-radius: 14px; font-size: 13px; line-height: 1.5; font-weight: 600; }
.msg.user .msg-bubble { background: var(--text); color: #fff; border-bottom-right-radius: 3px; }
.msg.claude .msg-bubble { background: var(--card); color: var(--text); border-bottom-left-radius: 3px; border: 1px solid var(--border); box-shadow: var(--shadow); }
.pin-chat-btn { background: none; border: none; color: var(--c-purple); font-size: 10px; font-weight: 800; cursor: pointer; padding: 3px 0 0; font-family: Nunito,sans-serif; }
.chat-input-wrap { display: flex; gap: 7px; padding: 10px 0 0; border-top: 1px solid var(--border); flex-shrink: 0; }
.chat-input { flex: 1; background: var(--card2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 9px 13px; font-family: 'Nunito', sans-serif; font-size: 13px; color: var(--text); outline: none; resize: none; max-height: 90px; }
.chat-input:focus { border-color: var(--c-purple); }
.chat-send { background: var(--text); border: none; border-radius: var(--radius-sm); width: 40px; height: 40px; font-size: 18px; color: #fff; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; align-self: flex-end; }
.chat-send:active { transform: scale(0.93); }
.chat-send:disabled { background: var(--card2); color: var(--muted); }
.chat-welkom { background: var(--card2); border: 1px solid var(--border); border-radius: var(--radius); padding: 11px 13px; margin-bottom: 12px; font-size: 12px; color: var(--muted); line-height: 1.6; }
.chat-welkom strong { color: var(--text); }
.typing { display: flex; gap: 4px; align-items: center; padding: 9px 13px; background: var(--card); border-radius: 14px; border-bottom-left-radius: 3px; border: 1px solid var(--border); width: fit-content; box-shadow: var(--shadow); }
.typing span { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); animation: bounce 1.2s infinite; }
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-top">
      <h1>🏠 Voorraad</h1>
      <div class="header-btns">
        <button class="hbtn" onclick="openRecept()">🍽 Recept</button>
        <button class="hbtn" onclick="openToevoegen()">+ Nieuw</button>
      </div>
    </div>
  </div>

  <!-- Sync bar -->
  <div class="sync-bar">
    <div class="sync-dot" id="sync-dot"></div>
    <span class="sync-tekst" id="sync-tekst">Verbinden...</span>
  </div>

  <!-- Update banner -->
  <div class="update-banner" id="update-banner">
    <span class="update-tekst">🆕 Nieuwe versie beschikbaar!</span>
    <button class="update-btn" onclick="voerUpdateUit()">Installeer</button>
  </div>

  <!-- Herinnering banner -->
  <div class="herinnering-banner" id="herinnering-banner" onclick="toonTabDirect('alarm')">
    <div class="herinnering-titel">
      <span>⚠️ Aandacht nodig</span>
      <span style="font-size:10px;font-weight:700">Tik om te bekijken →</span>
    </div>
    <div id="herinnering-items"></div>
  </div>

  <!-- Zoekbalk -->
  <div class="zoek-wrap">
    <span class="zoek-icon">🔍</span>
    <input class="zoek-input" type="text" placeholder="Zoek product..." oninput="zoek(this.value)" id="zoekInput">
  </div>

  <div class="tabs" id="tabs">
    <button class="tab t-koelkast active" onclick="toonTab('koelkast',this)"><span class="tab-icon">🧊</span>Koelkast</button>
    <button class="tab t-vriezer" onclick="toonTab('vriezer',this)"><span class="tab-icon">❄️</span>Vriezer</button>
    <button class="tab t-droog" onclick="toonTab('droog',this)"><span class="tab-icon">🥫</span>Droog</button>
    <button class="tab t-alarm" onclick="toonTab('alarm',this)"><span class="tab-icon">🔔</span>Alarm<span class="badge-tab" id="badge-alarm" style="display:none">0</span></button>
    <button class="tab t-boodschappen" onclick="toonTab('boodschappen',this)"><span class="tab-icon">🛒</span>Lijst<span class="badge-tab" id="badge-boodschappen" style="display:none">0</span></button>
    <button class="tab t-claude" onclick="toonTab('claude',this)"><span class="tab-icon">🤖</span>Claude</button>
  </div>

  <div class="content">
    <div id="panel-koelkast" class="panel active"></div>
    <div id="panel-vriezer" class="panel"></div>
    <div id="panel-droog" class="panel"></div>
    <div id="panel-alarm" class="panel"></div>
    <div id="panel-boodschappen" class="panel"></div>
    <div id="panel-claude" class="panel"></div>
    <div id="panel-zoek" class="panel"></div>
  </div>
</div>

<button class="fab" onclick="openToevoegen()">+</button>

<!-- Toevoegen/bewerken sheet -->
<div class="overlay" id="overlay-toevoegen">
  <div class="sheet">
    <div class="sheet-handel"></div>
    <h2 id="sheet-titel">Product toevoegen</h2>
    <label class="form-label">Snel kiezen</label>
    <div class="snel-list" id="snel-list"></div>
    <label class="form-label">Naam</label>
    <input class="form-input" id="f-naam" type="text" placeholder="Productnaam">
    <label class="form-label">Icoon</label>

// ============ ALARM LOGICA ============
function berekenAlarms() {
  var alarms = {verlopen:[], kritiek:[], warn:[], bijna:[]};
  producten.forEach(function(p) {
    var heeftDatumAlarm = false;
    if(p.datum) {
      var d = dagenTot(p.datum);
      if(d < 0) { alarms.verlopen.push({prod:p, dagen:d}); heeftDatumAlarm = true; }
      else if(d <= 2) { alarms.kritiek.push({prod:p, dagen:d}); heeftDatumAlarm = true; }
      else if(d <= 5) { alarms.warn.push({prod:p, dagen:d}); heeftDatumAlarm = true; }
    }
    if(!heeftDatumAlarm) {
      if(p.status === 'op') alarms.bijna.push({prod:p, reden:'Op'});
      else if(p.status === 'bijna') alarms.bijna.push({prod:p, reden:'Bijna op'});
    }
  });
  return alarms;
}

function updateHerinnering() {
  var alarms = berekenAlarms();
  var totaal = alarms.verlopen.length + alarms.kritiek.length + alarms.warn.length + alarms.bijna.length;
  var banner = document.getElementById('herinnering-banner');
  var itemsEl = document.getElementById('herinnering-items');
  var badge = document.getElementById('badge-alarm');

  if(totaal === 0) {
    banner.classList.remove('zichtbaar');
    badge.style.display = 'none';
    return;
  }
  badge.textContent = totaal;
  badge.style.display = 'inline-block';
  banner.classList.add('zichtbaar');

  var html = '';
  alarms.verlopen.slice(0,2).forEach(function(a) {
    html += '<div class="herinnering-item">⛔ <strong>' + a.prod.naam + '</strong> is verlopen (' + Math.abs(a.dagen) + ' dagen geleden)</div>';
  });
  alarms.kritiek.slice(0,2).forEach(function(a) {
    html += '<div class="herinnering-item">🔴 <strong>' + a.prod.naam + '</strong> verloopt over ' + a.dagen + ' dag(en)</div>';
  });
  alarms.bijna.slice(0,2).forEach(function(a) {
    html += '<div class="herinnering-item">🟡 <strong>' + a.prod.naam + '</strong> is ' + a.reden.toLowerCase() + '</div>';
  });
  if(totaal > 6) html += '<div class="herinnering-item" style="color:#E65100">+ nog ' + (totaal - 6) + ' meer...</div>';
  itemsEl.innerHTML = html;
}

function renderAlarm() {
  var panel = document.getElementById('panel-alarm');
  var alarms = berekenAlarms();
  var totaal = alarms.verlopen.length + alarms.kritiek.length + alarms.warn.length + alarms.bijna.length;

  if(totaal === 0) {
    panel.innerHTML = '<div class="alarm-leeg"><div class="alarm-leeg-icon">✅</div><p>Alles in orde!<br>Geen producten verlopen of bijna op.</p></div>';
    return;
  }

  var html = '';

  function alarmSectie(items, klasse, titel, badgeKlasse, labelFn) {
    if(!items.length) return '';
    var s = '<div class="alarm-card"><div class="alarm-card-header ' + klasse + '">' + titel + ' (' + items.length + ')</div>';
    items.forEach(function(a) {
      s += '<div class="alarm-item" onclick="bewerk(\'' + a.prod.id + '\')">';
      s += '<div class="alarm-item-icon">' + (a.prod.icon||'📦') + '</div>';
      s += '<div class="alarm-item-info"><div class="alarm-item-naam">' + a.prod.naam + '</div>';
      s += '<div class="alarm-item-detail">' + locNaam(a.prod.locatie) + (a.prod.aantal ? ' · ' + a.prod.aantal : '') + '</div></div>';
      s += '<span class="alarm-item-badge ' + badgeKlasse + '">' + labelFn(a) + '</span>';
      s += '</div>';
    });
    s += '</div>';
    return s;
  }

  html += alarmSectie(alarms.verlopen, 'danger', '⛔ Verlopen', 'badge-danger', function(a){ return Math.abs(a.dagen) + 'd verlopen'; });
  html += alarmSectie(alarms.kritiek, 'danger', '🔴 Verloopt snel', 'badge-danger', function(a){ return 'nog ' + a.dagen + ' dag(en)'; });
  html += alarmSectie(alarms.warn, 'warn', '🟡 Let op datum', 'badge-warn', function(a){ return 'nog ' + a.dagen + ' dagen'; });
  html += alarmSectie(alarms.bijna, 'bijna', '🟠 Op of bijna op', 'badge-bijna', function(a){ return a.reden; });

  html += '<div style="margin-top:12px;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)">';
  html += '<p style="font-size:12px;color:var(--muted);font-weight:600">Tik op een product om de status bij te werken. Bijgewerkte producten verdwijnen automatisch uit de alarmlijst.</p>';
  html += '</div>';

  panel.innerHTML = html;
}

// ============ RENDER ============
function render() {
  renderLocatie('koelkast');
  renderLocatie('vriezer');
  renderLocatie('droog');
  renderAlarm();
  renderBoodschappen();
  updateHerinnering();
}

function renderLocatie(loc) {
  var panel = document.getElementById('panel-' + loc);
  var prods = producten.filter(function(p){ return p.locatie === loc; });
  if(prods.length === 0) {
    panel.innerHTML = '<div class="leeg"><div class="leeg-icon">' + locIcon(loc) + '</div><p>Geen producten in ' + locNaam(loc) + '<br>Tik + om toe te voegen</p></div>';
    return;
  }
  var vol = prods.filter(function(p){return p.status==='vol';}).length;
  var aandacht = prods.filter(function(p){return p.status==='bijna'||p.status==='op'||(p.datum&&dagenTot(p.datum)<=5);}).length;
  var html = '<div class="stats">';
  html += '<div class="stat"><div class="stat-num" style="color:var(--c-ok)">' + vol + '</div><div class="stat-label">Op voorraad</div></div>';
  html += '<div class="stat"><div class="stat-num" style="color:var(--c-warn)">' + aandacht + '</div><div class="stat-label">Aandacht</div></div>';
  html += '<div class="stat"><div class="stat-num" style="color:var(--c-koelkast)">' + prods.length + '</div><div class="stat-label">Totaal</div></div>';
  html += '</div>';
  var cats = {};
  prods.forEach(function(p) {
    var c = p.categorie || 'Overig';
    if(!cats[c]) cats[c] = [];
    cats[c].push(p);
  });
  Object.keys(cats).sort().forEach(function(cat) {
    html += '<div class="cat-header"><div class="cat-lijn"></div><div class="cat-label">' + cat + '</div><div class="cat-lijn"></div></div>';
    cats[cat].forEach(function(p) { html += prodCard(p); });
  });
  panel.innerHTML = html;
}

function prodCard(p) {
  var houdbaar = '';
  var alarmKlasse = '';
  if(p.datum) {
    var d = dagenTot(p.datum);
    if(d < 0) { houdbaar = '<div class="prod-houdbaar danger">⛔ Verlopen (' + Math.abs(d) + ' dagen geleden)</div>'; alarmKlasse = 'heeft-alarm'; }
    else if(d <= 2) { houdbaar = '<div class="prod-houdbaar danger">🔴 Nog ' + d + ' dag(en) houdbaar!</div>'; alarmKlasse = 'heeft-alarm'; }
    else if(d <= 5) { houdbaar = '<div class="prod-houdbaar warn">🟡 Nog ' + d + ' dagen houdbaar</div>'; alarmKlasse = 'heeft-warn'; }
    else { houdbaar = '<div class="prod-houdbaar ok">✓ Houdbaar tot ' + formatDatum(p.datum) + '</div>'; }
  }
  var sk = {vol:'s-vol',half:'s-half',bijna:'s-bijna',op:'s-op'}[p.status]||'s-vol';
  var st = {vol:'Vol',half:'Half',bijna:'Bijna op',op:'Op'}[p.status]||'';
  return '<div class="prod-card status-' + p.status + ' ' + alarmKlasse + '" onclick="bewerk(\'' + p.id + '\')">' +
    '<div class="prod-icon">' + (p.icon||'📦') + '</div>' +
    '<div class="prod-info"><div class="prod-naam">' + p.naam + '</div>' +
    (p.aantal ? '<div class="prod-detail">' + p.aantal + '</div>' : '') + houdbaar + '</div>' +
    '<div class="prod-right"><span class="status-pill ' + sk + '">' + st + '</span></div>' +
  '</div>';
}

function renderBoodschappen() {
  var panel = document.getElementById('panel-boodschappen');
  var lijst = producten.filter(function(p){ return p.status==='bijna'||p.status==='op'; });
  var badge = document.getElementById('badge-boodschappen');
  if(lijst.length === 0) {
    badge.style.display = 'none';
    panel.innerHTML = '<div class="leeg"><div class="leeg-icon">✅</div><p>Alles op voorraad!</p></div>';
    return;
  }
  badge.textContent = lijst.length; badge.style.display = 'inline-block';
  lijst.sort(function(a,b){ return ({op:0,bijna:1}[a.status]||2)-({op:0,bijna:1}[b.status]||2); });
  var op = lijst.filter(function(p){return p.status==='op';});
  var bijna = lijst.filter(function(p){return p.status==='bijna';});
  var html = '';
  if(op.length) {
    html += '<div class="cat-header"><div class="cat-lijn"></div><div class="cat-label" style="color:var(--c-danger)">Op — moet gekocht</div><div class="cat-lijn"></div></div>';
    op.forEach(function(p){ html += boodschapItem(p); });
  }
  if(bijna.length) {
    html += '<div class="cat-header"><div class="cat-lijn"></div><div class="cat-label" style="color:var(--c-warn)">Bijna op — ook meenemen</div><div class="cat-lijn"></div></div>';
    bijna.forEach(function(p){ html += boodschapItem(p); });
  }
  html += '<div style="margin-top:14px"><button class="btn-primary" id="wis-boodschappen-btn">🗑 Verwijder afgevinkte</button></div>';
  panel.innerHTML = html;
  document.getElementById('wis-boodschappen-btn').onclick = wisBoodschappenLijst;
}

function boodschapItem(p) {
  var gk = boodschappenGekocht.indexOf(p.id) !== -1;
  var lk = {koelkast:'bl-koelkast',vriezer:'bl-vriezer',droog:'bl-droog'}[p.locatie]||'bl-droog';
  return '<div class="boodschap-item ' + (gk?'gekocht':'') + '">' +
    '<div class="boodschap-check ' + (gk?'aan':'') + '" onclick="toggleGekocht(\'' + p.id + '\')">' + (gk?'✓':'') + '</div>' +
    '<div style="flex:1"><div class="boodschap-naam">' + (p.icon||'📦') + ' ' + p.naam + '</div>' +
    '<div class="boodschap-sub">' + (p.aantal||'') + ' · ' + locNaam(p.locatie) + '</div></div>' +
    '<span class="boodschap-loc ' + lk + '">' + locNaam(p.locatie) + '</span>' +
  '</div>';
}

  document.querySelectorAll('#seg-status .seg-btn').forEach(function(b){ b.classList.toggle('active', b.dataset.val===p.status); });

function slaanOp() {
  var naam = document.getElementById('f-naam').value.trim();
  if(!naam) { alert('Vul een naam in'); return; }
  var prod = {
    id: bewerkId || ('p' + Date.now()),
    naam: naam,
    icon: document.getElementById('f-icon').value.trim() || '📦',
    locatie: segWaarden.locatie,
    categorie: document.getElementById('f-categorie').value.trim() || 'Overig',
    status: segWaarden.status,
    aantal: document.getElementById('f-aantal').value.trim(),
    datum: document.getElementById('f-datum').value,
  };
  if(bewerkId) { var i = producten.findIndex(function(p){return p.id===bewerkId;}); producten[i] = prod; }
  else producten.push(prod);
  slaMetSync(); render(); sluitOverlay('overlay-toevoegen');
}

function verwijder() {
  if(!bewerkId) return;
  producten = producten.filter(function(p){ return p.id !== bewerkId; });
  slaMetSync(); render(); sluitOverlay('overlay-toevoegen');
}

// ============ RECEPTEN ============
function getNaam(ing) {
  return typeof ing === 'string' ? ing : ing.naam;
}
function getHoeveelheid(ing) {
  return (typeof ing === 'object' && ing.hoeveelheid) ? ing.hoeveelheid : '';
}
function ingInVoorraad(ing) {
  var naam = getNaam(ing);
  return producten.some(function(p) {
    return p.naam.toLowerCase().indexOf(naam.toLowerCase()) !== -1 && p.status !== 'op';
  });
}

var receptFilter = 'alles';

function openRecept() {
  var el = document.getElementById('recept-list');
  el.innerHTML = '';

  // Filter knoppen
  var filterDiv = document.createElement('div');
  filterDiv.style.cssText = 'display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px';
  [{v:'alles',l:'Alles'},{v:'slowcooker',l:'🥘 Slowcooker'},{v:'pasta',l:'🍝 Pasta'}].forEach(function(f) {
    var btn = document.createElement('button');
    btn.textContent = f.l;
    btn.style.cssText = 'padding:6px 12px;border-radius:99px;border:1px solid;font-family:Nunito,sans-serif;font-size:12px;font-weight:800;cursor:pointer';
    if(receptFilter === f.v) {
      btn.style.background = 'var(--text)'; btn.style.color = '#fff'; btn.style.borderColor = 'var(--text)';
    } else {
      btn.style.background = 'var(--card2)'; btn.style.color = 'var(--muted)'; btn.style.borderColor = 'var(--border)';
    }
    btn.onclick = function() { receptFilter = f.v; openRecept(); };
    filterDiv.appendChild(btn);
  });
  el.appendChild(filterDiv);

  // Recepten
  var gefilterd = RECEPTEN.filter(function(r) {
    return receptFilter === 'alles' || r.type === receptFilter;
  });

  gefilterd.forEach(function(r) {
    var receptIdx = RECEPTEN.indexOf(r);

    // Check ontbrekende
    var ontbreekt = r.ing.filter(function(ing) { return !ingInVoorraad(ing); });

    // Card opbouwen met DOM
    var card = document.createElement('button');
    card.className = 'recept-item';
    card.style.marginBottom = '7px';
    card.style.width = '100%';
    card.style.textAlign = 'left';
    card.style.display = 'block';
    card.type = 'button';

    // Naam + type badge
    var naamDiv = document.createElement('div');
    naamDiv.className = 'recept-naam';
    naamDiv.textContent = r.naam;
    var badge = document.createElement('span');
    badge.style.cssText = 'font-size:10px;border-radius:99px;padding:2px 8px;font-weight:800;margin-left:6px';
    if(r.type === 'pasta') {
      badge.textContent = 'Pasta'; badge.style.background = '#FFF8E1'; badge.style.color = '#FF8F00';
    } else {
      badge.textContent = 'Slowcooker'; badge.style.background = '#E3F2FD'; badge.style.color = '#2979FF';
    }
    naamDiv.appendChild(badge);

    // Ingredienten
    var ingDiv = document.createElement('div');
    ingDiv.className = 'recept-ing';
    ingDiv.textContent = r.ing.map(function(ing) {
      var h = getHoeveelheid(ing);
      return getNaam(ing) + (h ? ' ' + h : '');
    }).join(' · ');

    // Status
    var statusDiv = document.createElement('div');
    if(ontbreekt.length > 0) {
      statusDiv.className = 'recept-warn';
      statusDiv.textContent = '⚠️ Ontbreekt: ' + ontbreekt.map(function(ing) {
        var h = getHoeveelheid(ing);
        return getNaam(ing) + (h ? ' (' + h + ')' : '');
      }).join(', ');
    } else {
      statusDiv.className = 'recept-ok';
      statusDiv.textContent = '✓ Alles aanwezig';
    }

    card.appendChild(naamDiv);
    card.appendChild(ingDiv);
    card.appendChild(statusDiv);
    (function(ridx) {
      card.onclick = function() { verwerkRecept(ridx); };
    })(receptIdx);
    el.appendChild(card);
  });

  document.getElementById('overlay-recept').classList.add('open');
}

function verwerkRecept(idx) {
  var r = RECEPTEN[idx];
  if(!r) return;

  // Stap 1: ontbrekende ingredienten
  var ontbreekt = r.ing.filter(function(ing) { return !ingInVoorraad(ing); });

  // Stap 2: voeg ontbrekende toe aan boodschappenlijst
  var toegevoegd = [];
  ontbreekt.forEach(function(ing) {
    var naam = getNaam(ing);
    var hoeveelheid = getHoeveelheid(ing);
    var bestaatAl = producten.some(function(p) { return p.naam.toLowerCase() === naam.toLowerCase(); });
    if(!bestaatAl) {
      var snelItem = SNELLIJST.find(function(s) { return s.naam.toLowerCase().indexOf(naam.toLowerCase()) !== -1; });
      producten.push({
        id: 'p' + Date.now() + Math.floor(Math.random() * 10000),
        naam: naam,
        icon: snelItem ? snelItem.icon : '📦',
        locatie: snelItem ? snelItem.loc : 'koelkast',
        categorie: snelItem ? snelItem.cat : 'Overig',
        status: 'op',
        aantal: hoeveelheid,
        datum: ''
      });
    } else {
      producten.forEach(function(p) {
        if(p.naam.toLowerCase() === naam.toLowerCase()) {
          p.status = 'op';
          if(hoeveelheid) p.aantal = hoeveelheid;
        }
      });
    }
    toegevoegd.push(naam + (hoeveelheid ? ' (' + hoeveelheid + ')' : ''));
  });

  // Stap 3: verlaag voorraad van aanwezige ingredienten
  r.ing.forEach(function(ing) {
    var naam = getNaam(ing);
    var wasOntbrekend = ontbreekt.some(function(o) { return getNaam(o) === naam; });
    if(wasOntbrekend) return;
    producten.forEach(function(p) {
      if(p.naam.toLowerCase().indexOf(naam.toLowerCase()) !== -1) {
        if(p.status === 'vol') p.status = 'half';
        else if(p.status === 'half') p.status = 'bijna';
        else if(p.status === 'bijna') p.status = 'op';
      }
    });
  });

  slaMetSync();
  render();
  sluitOverlay('overlay-recept');

  // Stap 4: melding + agenda
  var msg = '';
  if(toegevoegd.length > 0) msg += '🛒 Toegevoegd aan boodschappenlijst:\n' + toegevoegd.join('\n') + '\n\n';
  msg += '📅 Op welke dag wil je "' + r.naam + '" eten?\n(bijv. maandag, morgen, 15 april - of leeg laten om over te slaan)';
  var dag = prompt(msg);
  if(dag && dag.trim()) maakAgendaItem(r.naam, dag.trim(), r.type);
}

function maakAgendaItem(receptNaam, dagTekst, type) {
  var datum = parseDag(dagTekst);
  var morgen = new Date(datum.getTime() + 86400000);
  var beschrijving = type === 'pasta'
    ? 'Pasta koken als je thuiskomt om 17:30. Saus staat klaar in de slowcooker.'
    : 'Slowcooker instellen om 07:45 op LOW 9.5 uur. Klaar om 17:15.';
  var ics = [
    'BEGIN:VCALENDAR', 'VERSION:2.0', 'PRODID:-//Voorraad App//NL',
    'BEGIN:VEVENT',
    'UID:' + Date.now() + '@voorraad',
    'DTSTAMP:' + formatIcsDate(new Date()),
    'DTSTART;VALUE=DATE:' + formatIcsDatum(datum),
    'DTEND;VALUE=DATE:' + formatIcsDatum(morgen),
    'SUMMARY:Eten - ' + receptNaam,
    'DESCRIPTION:' + beschrijving,
    'END:VEVENT', 'END:VCALENDAR'
  ].join('\r\n');
  var blob = new Blob([ics], {type: 'text/calendar;charset=utf-8'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = 'eten.ics';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
  setTimeout(function() {
    alert('Agenda item aangemaakt voor ' + dagTekst + '.\nOpen het gedownloade bestand om toe te voegen aan iCloud agenda.');
  }, 300);
}

function parseDag(tekst) {
  var nu = new Date(); nu.setHours(12, 0, 0, 0);
  var t = tekst.toLowerCase().trim();
  if(t === 'morgen') { nu.setDate(nu.getDate() + 1); return nu; }
  if(t === 'overmorgen') { nu.setDate(nu.getDate() + 2); return nu; }
  var dagen = ['zondag','maandag','dinsdag','woensdag','donderdag','vrijdag','zaterdag'];
  var di = dagen.indexOf(t);
  if(di !== -1) {
    var diff = di - nu.getDay();
    if(diff <= 0) diff += 7;
    nu.setDate(nu.getDate() + diff);
    return nu;
  }
  var maanden = ['januari','februari','maart','april','mei','juni','juli','augustus','september','oktober','november','december'];
  var delen = tekst.trim().split(' ');
  if(delen.length >= 2) {
    var dag = parseInt(delen[0]);
    var mi = maanden.indexOf(delen[1].toLowerCase());
    if(!isNaN(dag) && mi !== -1) return new Date(nu.getFullYear(), mi, dag, 12);
  }
  var p = new Date(tekst);
  return isNaN(p) ? nu : p;
}

function formatIcsDate(d) {
  return d.getUTCFullYear() + pad(d.getUTCMonth()+1) + pad(d.getUTCDate()) + 'T' + pad(d.getUTCHours()) + pad(d.getUTCMinutes()) + pad(d.getUTCSeconds()) + 'Z';
}
function formatIcsDatum(d) { return d.getFullYear() + pad(d.getMonth()+1) + pad(d.getDate()); }
function pad(n) { return String(n).padStart(2, '0'); }

function renderMsg(role, content) {
  var pinKnop = '';
  if(role==='claude') {
    var veilig = content.replace(/'/g,"\\'").replace(/"/g,'&quot;').substring(0,200);
    pinKnop = '<button class="pin-chat-btn" onclick="pinVanuitChat(\''+veilig+'\')">📌 Vastpinnen</button>';
  }
  return '<div class="msg '+role+'"><div class="msg-label">'+(role==='user'?'Jij':'Claude')+'</div><div class="msg-bubble">'+content.split('\n').join('<br>')+'</div>'+pinKnop+'</div>';
}

function scrollChat() { var el=document.getElementById('chat-msgs'); if(el) el.scrollTop=el.scrollHeight; }
function stuurSnelvraag(t) { var inp=document.getElementById('chat-input'); if(inp) inp.value=t; stuurChat(); }
function chatKeydown(e) { if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); stuurChat(); } }

function bouwVoorraadContext() {
  if(producten.length===0) return 'De voorraad is leeg.';
  var regels=['Huidige voorraad:'];
  ['koelkast','vriezer','droog'].forEach(function(loc){
    var items=producten.filter(function(p){return p.locatie===loc;});
    if(!items.length) return;
    regels.push('\n'+{koelkast:'KOELKAST',vriezer:'VRIEZER',droog:'DROGE VOORRAAD'}[loc]+':');
    items.forEach(function(p){
      var r='- '+p.naam+' ('+{vol:'vol',half:'half vol',bijna:'bijna op',op:'op'}[p.status]+')';
      if(p.aantal) r+=', '+p.aantal;
      if(p.datum){ var d=Math.round((new Date(p.datum)-new Date())/86400000); r+=d<0?', VERLOPEN '+Math.abs(d)+' dagen geleden':', houdbaar nog '+d+' dagen'; }
      regels.push(r);
    });
  });
  return regels.join('\n');
}

function syncStatus(status, tekst) {
  var dot = document.getElementById('sync-dot');
  var txt = document.getElementById('sync-tekst');
  if(!dot || !txt) return;
  dot.className = 'sync-dot' + (status === 'bezig' ? ' bezig' : status === 'fout' ? ' fout' : '');
  txt.textContent = tekst;
}

async function supaFetch(method, body) {
  var url = SUPA_URL + '/rest/v1/' + SUPA_TABLE;
  var opts = {
    method: method,
    headers: {
      'Content-Type': 'application/json',
      'apikey': SUPA_KEY,
      'Authorization': 'Bearer ' + SUPA_KEY,
      'Prefer': method === 'POST' ? 'resolution=merge-duplicates' : ''
    }
  };
  if(body) opts.body = JSON.stringify(body);
  return fetch(url, opts);
}

async function laadVanCloud() {
  try {
    syncStatus('bezig', 'Laden...');
    var resp = await fetch(SUPA_URL + '/rest/v1/' + SUPA_TABLE + '?select=*', {
      headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY }
    });
    var rows = await resp.json();
    if(!Array.isArray(rows) || rows.length === 0) {
      // Geen data in cloud — upload lokale data
      await slaanInCloud();
      syncStatus('ok', 'Gesynchroniseerd');
      return;
    }
    // Haal data op
    var row = rows[0];
    var cloud = row.data || {};
    if(cloud.producten) { producten = cloud.producten; localStorage.setItem('voorraad', JSON.stringify(producten)); }
    if(cloud.vastGeheugen) { vastGeheugen = cloud.vastGeheugen; localStorage.setItem('vastGeheugen', JSON.stringify(vastGeheugen)); }
    if(cloud.chatGeschiedenis) { chatGeschiedenis = cloud.chatGeschiedenis; localStorage.setItem('chatGeschiedenis', JSON.stringify(chatGeschiedenis)); }
    if(cloud.boodschappenGekocht) { boodschappenGekocht = cloud.boodschappenGekocht; localStorage.setItem('boodschappenGekocht', JSON.stringify(boodschappenGekocht)); }
    render();
    syncStatus('ok', 'Gesynchroniseerd ' + tijdNu());
  } catch(e) {
    syncStatus('fout', 'Laden mislukt');
  }
}

async function slaanInCloud() {
  if(syncBezig) return;
  syncBezig = true;
  syncStatus('bezig', 'Opslaan...');
  try {
    var payload = {
      id: 'steven',
      data: {
        producten: producten,
        vastGeheugen: vastGeheugen,
        chatGeschiedenis: chatGeschiedenis.slice(-50),
        boodschappenGekocht: boodschappenGekocht
      },
      updated_at: new Date().toISOString()
    };
    var resp = await supaFetch('POST', payload);
    if(resp.ok || resp.status === 201 || resp.status === 200) {
      syncStatus('ok', 'Opgeslagen ' + tijdNu());
    } else {
      syncStatus('fout', 'Opslaan mislukt');
    }
  } catch(e) {
    syncStatus('fout', 'Geen verbinding');
  }
  syncBezig = false;
}

function slaMetSync() {
  sla();
  clearTimeout(syncTimer);
  syncTimer = setTimeout(slaanInCloud, 1500);
}

function tijdNu() {
  var d = new Date();
  return d.getHours() + ':' + String(d.getMinutes()).padStart(2,'0');
}

  var nu=new Date(); nu.setHours(0,0,0,0);
  return Math.round((d-nu)/86400000);
}
